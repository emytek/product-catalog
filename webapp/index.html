<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Catalog Manager | SAP Fiori</title>
    <script>
        // Local development: point API calls to the Node.js backend on port 3000.
        // On BTP (approuter), this variable is not set and the relative /api/* path is used instead.
        if (window.location.hostname === "localhost") {
            window.API_BASE_URL = "http://localhost:3000";
        }
    </script>
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{"com.demo.productcatalog": "./"}'
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-frameOptions="trusted"
        data-sap-ui-language="en">
    </script>
</head>
<body class="sapUiBody" id="content">
    <div data-sap-ui-component
         data-name="com.demo.productcatalog"
         data-id="container"
         data-settings='{"id":"productcatalog"}'
         style="height:100%">
    </div>
</body>
</html>
